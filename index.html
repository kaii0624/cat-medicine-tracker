<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff9f5" />
    <meta
      name="description"
      content="猫のお薬を朝・夜の1日2回記録して、家族に共有できるシンプルな記録アプリ"
    />
    <title>ねこのおくすり</title>
    <link rel="icon" href="assets/cat-medicine.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <span class="paw" aria-hidden="true">●</span>
        <h1>ねこのおくすり</h1>
        <span class="paw paw--right" aria-hidden="true">●</span>
      </header>

      <section class="calendar-card" aria-label="直近4日のおくすりカレンダー">
        <div id="calendar" class="calendar-grid" aria-live="polite"></div>
      </section>

      <section class="status-card" aria-labelledby="status-title">
        <div class="status-cat" aria-hidden="true">
          <span class="heart heart--one">♥</span>
          <span class="heart heart--two">♥</span>
          <img src="assets/cat-medicine.png" alt="" />
        </div>
        <div class="status-copy">
          <h2 id="status-title" class="elapsed">まだ記録がありません</h2>
          <p id="last-record" class="last-record">最初のお薬を記録しよう</p>
          <button id="share-button" class="share-button" type="button" disabled>
            <span aria-hidden="true">↗</span> 家族に共有
          </button>
        </div>
      </section>

      <section class="record-card" aria-label="今日のおくすりを記録">
        <div class="period-tabs" role="group" aria-label="朝か夜を選択">
          <button class="period-button is-active" type="button" data-period="morning" aria-pressed="true">
            <span class="sun-icon" aria-hidden="true">☀</span> 朝
          </button>
          <button class="period-button" type="button" data-period="evening" aria-pressed="false">
            <span class="moon-icon" aria-hidden="true">●</span> 夜
          </button>
        </div>

        <div class="time-label" aria-hidden="true">
          <span>時</span><span>分</span>
        </div>
        <div class="wheel-picker" aria-label="記録する時刻">
          <div id="hour-wheel" class="wheel" role="listbox" tabindex="0" aria-label="時"></div>
          <span class="time-colon" aria-hidden="true">:</span>
          <div id="minute-wheel" class="wheel" role="listbox" tabindex="0" aria-label="分"></div>
        </div>

        <button id="record-button" class="record-button" type="button">
          <span class="capsule-icon" aria-hidden="true"><i></i></span>
          <span id="record-button-label">記録する</span>
          <span class="button-cat" aria-hidden="true">ฅ</span>
        </button>
        <button id="delete-button" class="delete-button" type="button" hidden>この記録を削除</button>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
